name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to validate (format: vX.Y.Z). Defaults to current version-derived tag."
        required: false
        type: string
      publish:
        description: "Publish to RubyGems and create a GitHub release"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: validate release candidate
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      publish: ${{ steps.meta.outputs.publish }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust bindgen dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev pkg-config

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ github.event.inputs.release_tag || '' }}
          DISPATCH_PUBLISH: ${{ github.event.inputs.publish || 'false' }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "push" ]]; then
            release_tag="${REF_NAME}"
            publish="true"
          else
            release_tag="${DISPATCH_TAG:-}"
            publish="${DISPATCH_PUBLISH:-false}"
            if [[ -z "${release_tag}" ]]; then
              release_tag="$(./bin/check-version-sync --print-tag)"
            fi
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}"
          echo "publish=${publish}"

      - name: Verify version and tag consistency
        run: ./bin/check-version-sync --tag "${{ steps.meta.outputs.release_tag }}"

      - name: Require tag-based publish runs
        if: ${{ steps.meta.outputs.publish == 'true' }}
        run: ./bin/check-version-sync --tag "${{ steps.meta.outputs.release_tag }}" --git-tag

      - name: Run release preflight stack
        run: SKIP_DOCKER=1 ./bin/release-preflight

      - name: Run packaged gem manifest gate
        run: ./bin/test-packaged-gem-manifest

  build_artifacts:
    name: build release artifacts
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build source gem and checksum
        run: ./bin/release-artifacts --tag "${{ needs.validate.outputs.release_tag }}" --skip-preflight

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            pkg/lda-ruby-*.gem
            pkg/lda-ruby-*.gem.sha256
          if-no-files-found: error

  build_precompiled_artifacts:
    name: build precompiled artifacts / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            label: linux-x86_64
            kind: linux
          - os: macos-15-intel
            platform: x86_64-darwin
            label: macos-x86_64
            kind: macos
          - os: macos-14
            platform: arm64-darwin
            label: macos-arm64
            kind: macos
          - os: windows-latest
            platform: x64-mingw-ucrt
            label: windows-x64-mingw-ucrt
            kind: windows
          - os: ubuntu-latest
            platform: x86_64-linux-musl
            label: linux-musl-x86_64
            kind: musl

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Rust toolchain
        if: ${{ matrix.kind != 'musl' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust GNU toolchain for RubyInstaller ABI
        if: ${{ matrix.kind == 'windows' }}
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          "RUSTUP_TOOLCHAIN=stable-x86_64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve cargo path for bash steps
        if: ${{ matrix.kind == 'windows' }}
        shell: pwsh
        run: |
          $cargo = (Get-Command cargo -ErrorAction Stop).Source
          "CARGO=$cargo" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved cargo executable: $cargo"

      - name: Install Rust bindgen dependencies (Linux)
        if: ${{ matrix.kind == 'linux' }}
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev pkg-config

      - name: Install LLVM (bindgen dependency)
        if: ${{ matrix.kind == 'windows' || matrix.kind == 'macos' }}
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1.8"

      - name: Export LIBCLANG_PATH (macOS)
        if: ${{ matrix.kind == 'macos' }}
        shell: bash
        run: |
          llvm_bin="$(dirname "$(command -v llvm-config)")"
          llvm_root="$(cd "${llvm_bin}/.." && pwd)"
          echo "LIBCLANG_PATH=${llvm_root}/lib" >> "${GITHUB_ENV}"

      - name: Configure bindgen include paths for Windows Ruby headers
        if: ${{ matrix.kind == 'windows' }}
        shell: pwsh
        run: |
          $shimInclude = (Resolve-Path "ext/lda-ruby-rust/include").Path.Replace('\', '/')
          $includeDirs = @($shimInclude)
          $devkitRoot = $null

          if ($env:RI_DEVKIT) {
            $devkitRoot = $env:RI_DEVKIT.Replace('\', '/')
            $candidateDirs = @(
              "$devkitRoot/ucrt64/include",
              "$devkitRoot/mingw64/include",
              "$devkitRoot/usr/include"
            )
            $withStrings = $candidateDirs | Where-Object { Test-Path "$_/strings.h" } | Select-Object -Unique
            if ($withStrings) {
              $includeDirs += $withStrings
            }
          }

          $bindgenArgList = @("--target=x86_64-w64-windows-gnu")
          if ($devkitRoot) {
            $bindgenArgList += "--sysroot=$devkitRoot/ucrt64"
          }
          $bindgenArgList += ($includeDirs | Select-Object -Unique | ForEach-Object { "-I$_" })
          $bindgenArgList += @("-msse2", "-mavx")
          $bindgenArgs = $bindgenArgList -join " "

          "BINDGEN_EXTRA_CLANG_ARGS_x86_64-pc-windows-gnu=$bindgenArgs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BINDGEN_EXTRA_CLANG_ARGS_x86_64_pc_windows_gnu=$bindgenArgs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BINDGEN_EXTRA_CLANG_ARGS=$bindgenArgs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $existingCppFlags = ruby -rrbconfig -e 'print RbConfig::CONFIG.fetch("CPPFLAGS", "")'
          $mergedCppFlags = "$existingCppFlags $bindgenArgs".Trim()
          "RBCONFIG_CPPFLAGS=$mergedCppFlags" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Configured bindgen extra clang args: $bindgenArgs"
          Write-Host "Configured RBCONFIG_CPPFLAGS: $mergedCppFlags"

      - name: Build and verify precompiled gem
        if: ${{ matrix.kind != 'musl' }}
        shell: bash
        run: ./bin/release-precompiled-artifacts --tag "${{ needs.validate.outputs.release_tag }}" --platform "${{ matrix.platform }}" --skip-preflight

      - name: Build and verify musl precompiled gem (Alpine container)
        if: ${{ matrix.kind == 'musl' }}
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          docker run --rm \
            -e RELEASE_TAG="${RELEASE_TAG}" \
            -e PLATFORM="${PLATFORM}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            alpine:3.20 \
            sh -lc '
              set -euo pipefail
              apk add --no-cache bash build-base git ruby ruby-dev ruby-bundler rust cargo clang llvm-dev clang17-libclang pkgconf
              mkdir -p /workspace/pkg
              libclang_path="$(dirname "$(find /usr/lib -name libclang.so | head -n1)")"
              export LIBCLANG_PATH="${libclang_path}"
              bundle install
              ./bin/release-precompiled-artifacts --tag "${RELEASE_TAG}" --platform "${PLATFORM}" --skip-preflight
            '

      - name: Upload precompiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-precompiled-${{ matrix.platform }}
          path: |
            pkg/lda-ruby-*-${{ matrix.platform }}.gem
            pkg/lda-ruby-*-${{ matrix.platform }}.gem.sha256
          if-no-files-found: error

  publish_rubygems:
    name: publish to RubyGems
    runs-on: ubuntu-latest
    needs: [validate, build_artifacts, build_precompiled_artifacts]
    if: ${{ needs.validate.outputs.publish == 'true' }}
    environment:
      name: release

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Publish gem
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          set -euo pipefail
          [[ -n "${RUBYGEMS_API_KEY:-}" ]] || { echo "RUBYGEMS_API_KEY is required"; exit 1; }

          mkdir -p "${HOME}/.gem"
          cat > "${HOME}/.gem/credentials" <<CREDENTIALS
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          CREDENTIALS
          chmod 0600 "${HOME}/.gem/credentials"

          shopt -s nullglob
          gem_files=(dist/lda-ruby-*.gem)
          if [[ "${#gem_files[@]}" -eq 0 ]]; then
            echo "No release gem artifacts found in dist/"
            exit 1
          fi

          for gem_file in "${gem_files[@]}"; do
            echo "Pushing ${gem_file}"
            push_log="$(mktemp)"
            set +e
            gem push "${gem_file}" 2>&1 | tee "${push_log}"
            push_status=$?
            set -e

            if [[ "${push_status}" -ne 0 ]]; then
              if grep -Eiq "Please enter OTP code|no OTP code provided|enabled multi-factor authentication" "${push_log}"; then
                echo "::error::RubyGems API key requires OTP. Update release environment secret RUBYGEMS_API_KEY with a CI-safe key."
              fi
              exit "${push_status}"
            fi
          done

  publish_github_release:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: [validate, build_artifacts, build_precompiled_artifacts, publish_rubygems]
    if: ${{ needs.validate.outputs.publish == 'true' }}
    permissions:
      contents: write
    environment:
      name: release

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          files: |
            dist/lda-ruby-*.gem
            dist/lda-ruby-*.gem.sha256
          generate_release_notes: true

  verify_published_artifacts:
    name: verify published artifacts
    runs-on: ubuntu-latest
    needs: [validate, publish_rubygems, publish_github_release]
    if: ${{ needs.validate.outputs.publish == 'true' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Verify RubyGems and GitHub release artifacts
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./bin/verify-release-publish --tag "${{ needs.validate.outputs.release_tag }}"
