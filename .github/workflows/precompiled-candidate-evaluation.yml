name: precompiled-candidate-evaluation

on:
  workflow_dispatch:

jobs:
  windows-precompiled-candidate:
    name: precompiled candidate / windows-latest / ruby-3.3
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust GNU toolchain for RubyInstaller ABI
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          "RUSTUP_TOOLCHAIN=stable-x86_64-pc-windows-gnu" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve cargo path for bash steps
        shell: pwsh
        run: |
          $cargo = (Get-Command cargo -ErrorAction Stop).Source
          "CARGO=$cargo" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Resolved cargo executable: $cargo"

      - name: Install LLVM (bindgen dependency)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18.1.8"

      - name: Configure bindgen include paths for MinGW headers
        shell: pwsh
        run: |
          $includeDirs = @(
            "C:/msys64/ucrt64/include",
            "C:/msys64/mingw64/include",
            "C:/msys64/usr/include"
          ) | Where-Object { Test-Path $_ } | Select-Object -Unique

          if (-not $includeDirs) {
            $discovered = Get-ChildItem -Path "C:/msys64" -Filter "strings.h" -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 3 |
              ForEach-Object { $_.Directory.FullName.Replace('\', '/') }
            $includeDirs = $discovered | Select-Object -Unique
          }

          if (-not $includeDirs) {
            throw "Unable to discover MinGW include directories containing strings.h"
          }

          $bindgenArgs = ($includeDirs | ForEach-Object { "-I$_" }) -join " "
          "BINDGEN_EXTRA_CLANG_ARGS_x86_64-pc-windows-gnu=$bindgenArgs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BINDGEN_EXTRA_CLANG_ARGS_x86_64_pc_windows_gnu=$bindgenArgs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BINDGEN_EXTRA_CLANG_ARGS=$bindgenArgs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Configured bindgen extra clang args: $bindgenArgs"

      - name: Detect local gem platform
        id: platform
        shell: bash
        run: |
          platform="$(ruby -rrubygems -e 'puts Gem::Platform.local.to_s.sub(/-darwin-[0-9]+\z/, "-darwin")')"
          echo "platform=${platform}" >> "${GITHUB_OUTPUT}"
          echo "Detected platform: ${platform}"

      - name: Build precompiled candidate artifact (no preflight/runtime checks)
        shell: bash
        run: |
          ./bin/release-precompiled-artifacts \
            --platform "${{ steps.platform.outputs.platform }}" \
            --skip-preflight \
            --skip-runtime-checks

      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: precompiled-candidate-${{ steps.platform.outputs.platform }}
          path: |
            pkg/lda-ruby-*-${{ steps.platform.outputs.platform }}.gem
            pkg/lda-ruby-*-${{ steps.platform.outputs.platform }}.gem.sha256

  musl-precompiled-candidate:
    name: precompiled candidate / alpine-musl / ruby-system
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Build musl precompiled candidate artifact (Alpine container)
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            alpine:3.20 \
            sh -lc '
              set -euo pipefail
              apk add --no-cache bash build-base git ruby ruby-dev ruby-bundler rust cargo clang llvm-dev clang17-libclang pkgconf
              mkdir -p /workspace/pkg
              platform="$(ruby -rrubygems -e '"'"'"'"'"'"'"'"'puts Gem::Platform.local.to_s.sub(/-darwin-[0-9]+\z/, "-darwin")'"'"'"'"'"'"'"'"')"
              libclang_path="$(dirname "$(find /usr/lib -name libclang.so | head -n1)")"
              export LIBCLANG_PATH="${libclang_path}"
              bundle install
              ./bin/release-precompiled-artifacts --platform "${platform}" --skip-preflight --skip-runtime-checks
            '

      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: precompiled-candidate-linux-musl
          path: |
            pkg/lda-ruby-*-linux-musl.gem
            pkg/lda-ruby-*-linux-musl.gem.sha256
