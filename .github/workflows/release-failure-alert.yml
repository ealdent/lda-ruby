name: release-failure-alert

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  create-alert:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Manage release failure alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            if (run.event !== "push") {
              core.info(`Skipping alert issue for non-tag release run event: ${run.event}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = String(run.id);
            const title = `[release-alert] release workflow run ${runId} failed`;
            const query = `repo:${owner}/${repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query });

            if (run.conclusion === "success") {
              if (existing.data.total_count === 0) {
                core.info(`No open alert issue to close for run ${runId}`);
                return;
              }

              for (const issue of existing.data.items) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `Closing automatically because release workflow run ${runId} is now successful: ${run.html_url}`
                });

                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: "closed"
                });
              }

              core.info(`Closed ${existing.data.total_count} alert issue(s) for run ${runId}`);
              return;
            }

            if (run.conclusion !== "failure") {
              core.info(`Skipping alert issue for release run ${runId} with conclusion: ${run.conclusion}`);
              return;
            }

            if (existing.data.total_count > 0) {
              core.info(`Existing alert issue already open for run ${runId}`);
              return;
            }

            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: run.id,
              per_page: 100
            });

            const failedJobs = jobsResponse.data.jobs.filter((job) =>
              ["failure", "cancelled", "timed_out", "action_required", "stale"].includes(job.conclusion)
            );

            const failedJobLines = failedJobs.length === 0
              ? ["- Failed jobs: unavailable"]
              : [
                  "- Failed jobs:",
                  ...failedJobs.map((job) => `  - ${job.name}: ${job.html_url}`)
                ];

            const body = [
              "Release workflow reported a failure.",
              "",
              `- Workflow run: ${run.html_url}`,
              `- Event: ${run.event}`,
              `- Ref: ${run.head_branch || run.head_sha}`,
              `- SHA: ${run.head_sha}`,
              `- Triggered by: ${run.actor?.login || "unknown"}`,
              `- Conclusion: ${run.conclusion}`,
              ...failedJobLines,
              "",
              "Action: inspect failed jobs (artifact build/publish/verification) and apply runbook rollback/retry steps."
            ].join("\n");

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body
            });
